# =============================================================================
# docker-compose.yml — Cinema Management API + Nginx
# =============================================================================
#
# Arquitetura:
#   Cliente → Nginx (porta 80/443) → Spring Boot (porta 8080, interna)
#
# =============================================================================

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinema-management-api
    ports:
      - "8080"
    networks:
      - cinema-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped

  nginx:
    build: ./nginx
    container_name: cinema-nginx
    ports:
      - "80:80"
    networks:
      - cinema-network
    depends_on:
      - api
    volumes:
      - ./nginx/logs:/var/log/nginx

networks:
  cinema-network:
    driver: bridge