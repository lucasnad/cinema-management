# Número de processos worker (auto = 1 por CPU disponível)
worker_processes auto;

events {
    # Máximo de conexões simultâneas por worker
    worker_connections 1024;
}

http {

    # -------------------------------------------------------
    # LOG ESTRUTURADO (formato JSON)
    # Campos obrigatórios pelo requisito 3.6:
    #   ip          → IP do cliente
    #   method      → Method HTTP (GET, POST, etc.)
    #   path        → Rota acessada
    #   status      → Código HTTP da resposta
    #   upstream_ms → Tempo de resposta do upstream (Spring Boot)
    # -------------------------------------------------------
    # Variável auxiliar para exibir o upstream quando disponível, ou "CACHED" quando
    # a resposta veio do cache (nesse caso $upstream_addr e $upstream_response_time ficam vazios)
    map $upstream_addr $upstream_addr_display {
        ""      "CACHED";
        default $upstream_addr;
    }

    map $upstream_response_time $upstream_response_time_display {
        ""      "CACHED";
        default "${upstream_response_time}s";
    }

    log_format structured 'IP: $remote_addr | Metódo: $request_method | URI: $request_uri | Status: $status | Tempo de resposta: $upstream_response_time_display | Cache: $upstream_cache_status | Instância: $upstream_addr_display';

    # Redireciona logs para stdout/stderr do container (visível no Docker)
    access_log /dev/stdout structured;
    error_log  /dev/stderr warn;

    # -------------------------------------------------------
    # RATE LIMITING — zona de controle de requisições por IP
    # $binary_remote_addr = IP do cliente (formato compacto)
    # 10m = 10MB de memória para armazenar os contadores
    # rate=5r/s = máximo 5 requisições por segundo por IP
    # -------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    # -------------------------------------------------------
    # COMPRESSÃO GZIP
    # Reduz o tamanho das respostas antes de enviar ao cliente
    # -------------------------------------------------------
    gzip on;

    # Tipos de conteúdo que serão comprimidos
    gzip_types application/json text/plain;

    # Adiciona header "Vary: Accept-Encoding" na resposta
    # (necessário para caches HTTP funcionarem corretamente)
    gzip_vary on;

    # -------------------------------------------------------
    # CACHE DE GET
    # Armazena respostas em disco para evitar bater na API
    # a cada requisição idêntica
    # levels=1:2     → estrutura de subpastas no disco
    # keys_zone=10m  → 10MB de memória para as chaves do cache
    # max_size=100m  → máximo 100MB em disco para o cache
    # inactive=10s   → entradas sem acesso expiram em 10s
    # -------------------------------------------------------
    proxy_cache_path /tmp/nginx_cache
        levels=1:2
        keys_zone=api_cache:10m
        max_size=100m
        inactive=10s
        use_temp_path=off;


    # -------------------------------------------------------
    # UPSTREAM — Load Balancing entre 2 instâncias da API
    # Nginx utiliza round-robin por padrão
    # keepalive 32: mantém até 32 conexões persistentes com cada
    # upstream, evitando o overhead de TCP handshake a cada request
    # -------------------------------------------------------
    upstream cinema-api {
        # round-robin (padrão do Nginx): alterna entre api1 e api2 de forma sequencial,
        # garantindo distribuição visível mesmo em requisições rápidas e sequenciais.
        server api1:8080;
        server api2:8080;
        keepalive 32;
    }

    server {
        # Nginx escuta na porta 80
        listen 80;
        server_name localhost;
        # 308 preserva o métdo HTTP (POST continua POST após o redirect)
        # e é permanente (HTTP → HTTPS nunca vai mudar)
        # 301 converteria POST → GET, fazendo requisições POST via HTTP falharem silenciosamente
        return 308 https://$host$request_uri;
    }

    server {
        # Nginx escuta na porta 443 com SSL (certificado self-signed)
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;

        # Protocolos e cifras mínimas recomendadas
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # -------------------------------------------------------
        # LIMITE DE PAYLOAD
        # Rejeita requisições com body maior que 1MB
        # Retorna HTTP 413 (Request Entity Too Large)
        # -------------------------------------------------------
        client_max_body_size 1m;


        location / {
            # -------------------------------------------------------
            # Aplica o rate limiting definido acima
            # burst=10: permite um pico de até 10 requisições extras
            # nodelay: processa o burst imediatamente (sem enfileirar)
            # Quem ultrapassar o burst recebe HTTP 429
            # -------------------------------------------------------
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;

            # Ativa o cache para esse location
            proxy_cache api_cache;

            # Só cacheia GET e HEAD (nunca POST, PUT, DELETE)
            proxy_cache_methods GET HEAD;

            # Respostas 200 ficam cacheadas por 10 segundos
            proxy_cache_valid 200 10s;

            # Ignora headers anti-cache enviados pelo Spring Security
            # (Cache-Control: no-store, Pragma: no-cache, etc.)
            # O controle de cache é feito aqui no Nginx, não na API.
            proxy_ignore_headers Cache-Control Expires;
            proxy_hide_header Cache-Control;
            proxy_hide_header Pragma;

            # Chave única do cache: mtodo + URL completa
            proxy_cache_key "$scheme$request_method$host$request_uri";

            # Se a requisição tiver header Authorization, ignora o cache
            # (não queremos cachear dados de usuários autenticados)
            proxy_cache_bypass $http_authorization;
            proxy_no_cache $http_authorization;

            # Header de diagnóstico: mostra se foi HIT ou MISS
            add_header X-Cache-Status $upstream_cache_status;

            # -------------------------------------------------------
            # HEADERS DE SEGURANÇA
            # "always" garante que o header é enviado em qualquer
            # status HTTP, inclusive erros (4xx, 5xx)
            # -------------------------------------------------------

            # Impede o navegador de "adivinhar" o tipo do conteúdo (MIME sniffing).
            # Sem esse header, o navegador pode interpretar um arquivo .txt como
            # um script executável, abrindo brecha para ataques de injeção de código.
            add_header X-Content-Type-Options "nosniff" always;

            # Impede que a página seja carregada dentro de um <iframe>.
            # Isso protege contra ataques de Clickjacking, onde o atacante
            # embute sua aplicação em um iframe invisível em outro site
            # para enganar o usuário a clicar em ações sem perceber.
            # DENY = bloqueia em qualquer site, inclusive no próprio domínio.
            add_header X-Frame-Options "DENY" always;

            # Ativa o filtro de XSS (Cross-Site Scripting) embutido em navegadores antigos.
            # "1" habilita o filtro e "mode=block" faz o navegador bloquear a página
            # inteira ao detectar um ataque, em vez de tentar "sanitizar" o conteúdo.
            # Obs: navegadores modernos já ignoram esse header (usam CSP no lugar),
            # mas é mantido para compatibilidade com browsers mais antigos.
            add_header X-XSS-Protection "1; mode=block" always;

            # Encaminha todas as requisições para a API Spring Boot
            proxy_pass http://cinema-api;

            # Necessário para keepalive funcionar no upstream
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Header de diagnóstico: mostra qual instância respondeu (api1 ou api2)
            add_header X-Upstream-Instance $upstream_addr always;

            # Intercepta erros retornados pelo upstream (Spring Boot)
            # e serve as error pages customizadas do Nginx
            proxy_intercept_errors on;

            # Repassa headers importantes para a API saber a origem real
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Endpoint de teste para demonstrar a error page de 500
        location = /test/500 {
            return 500;
        }

        # -------------------------------------------------------
        # Custom Error Pages
        # -------------------------------------------------------
        error_page 404             /error_pages/404.html;
        error_page 500 502 503 504 /error_pages/50x.html;

        location ^~ /error_pages/ {
            root /etc/nginx;
            internal;
        }

        # Rotas não mapeadas: Nginx retorna 404 diretamente
        # sem repassar pro Spring Boot (que bloquearia com 401)
        location @not_found {
            return 404;
        }
    }
}