# Número de processos worker (auto = 1 por CPU disponível)
worker_processes auto;

events {
    # Máximo de conexões simultâneas por worker
    worker_connections 1024;
}

http {

    # upstream define o servidor de destino das requisições
    # "cinema-api" é o apelido que usaremos no proxy_pass
    # "api" é o nome do serviço no docker-compose, porta 8080
    upstream cinema-api {
        server api:8080;
    }

    server {
        # Nginx escuta na porta 80
        listen 80;
        server_name localhost;

        # -------------------------------------------------------
        # HEADERS DE SEGURANÇA
        # "always" garante que o header é enviado em qualquer
        # status HTTP, inclusive erros (4xx, 5xx)
        # -------------------------------------------------------

        # Impede o navegador de "adivinhar" o tipo do conteúdo (MIME sniffing).
        # Sem esse header, o navegador pode interpretar um arquivo .txt como
        # um script executável, abrindo brecha para ataques de injeção de código.
        add_header X-Content-Type-Options "nosniff" always;

        # Impede que a página seja carregada dentro de um <iframe>.
        # Isso protege contra ataques de Clickjacking, onde o atacante
        # embute sua aplicação em um iframe invisível em outro site
        # para enganar o usuário a clicar em ações sem perceber.
        # DENY = bloqueia em qualquer site, inclusive no próprio domínio.
        add_header X-Frame-Options "DENY" always;

        # Ativa o filtro de XSS (Cross-Site Scripting) embutido em navegadores antigos.
        # "1" habilita o filtro e "mode=block" faz o navegador bloquear a página
        # inteira ao detectar um ataque, em vez de tentar "sanitizar" o conteúdo.
        # Obs: navegadores modernos já ignoram esse header (usam CSP no lugar),
        # mas é mantido para compatibilidade com browsers mais antigos.
        add_header X-XSS-Protection "1; mode=block" always;

        location / {
            # Encaminha todas as requisições para a API Spring Boot
            proxy_pass http://cinema-api;

            # Repassa headers importantes para a API saber a origem real
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}